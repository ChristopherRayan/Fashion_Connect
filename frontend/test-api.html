<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Integration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>FashionConnect API Integration Test</h1>
    
    <div>
        <button onclick="testHealthCheck()">Test Health Check</button>
        <button onclick="testProducts()">Test Products API</button>
        <button onclick="testDesigners()">Test Designers API</button>
        <button onclick="testAuth()">Test Auth API</button>
    </div>
    
    <div id="results"></div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api/v1';
        
        function addResult(test, status, message) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${status}`;
            div.innerHTML = `<strong>${test}:</strong> ${message}`;
            results.appendChild(div);
        }
        
        async function testHealthCheck() {
            addResult('Health Check', 'loading', 'Testing...');
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    const data = await response.json();
                    addResult('Health Check', 'success', `✅ Server is healthy: ${data.message}`);
                } else {
                    addResult('Health Check', 'error', `❌ Server responded with status: ${response.status}`);
                }
            } catch (error) {
                addResult('Health Check', 'error', `❌ Connection failed: ${error.message}`);
            }
        }
        
        async function testProducts() {
            addResult('Products API', 'loading', 'Testing...');
            try {
                const response = await fetch(`${API_BASE_URL}/products`);
                if (response.ok) {
                    const data = await response.json();
                    addResult('Products API', 'success', `✅ Products loaded: ${data.data?.docs?.length || 0} products found`);
                } else {
                    addResult('Products API', 'error', `❌ Products API failed with status: ${response.status}`);
                }
            } catch (error) {
                addResult('Products API', 'error', `❌ Products API failed: ${error.message}`);
            }
        }
        
        async function testDesigners() {
            addResult('Designers API', 'loading', 'Testing...');
            try {
                const response = await fetch(`${API_BASE_URL}/designers`);
                if (response.ok) {
                    const data = await response.json();
                    addResult('Designers API', 'success', `✅ Designers loaded: ${data.data?.length || 0} designers found`);
                } else {
                    addResult('Designers API', 'error', `❌ Designers API failed with status: ${response.status}`);
                }
            } catch (error) {
                addResult('Designers API', 'error', `❌ Designers API failed: ${error.message}`);
            }
        }
        
        async function testAuth() {
            addResult('Auth API', 'loading', 'Testing...');
            try {
                // Test registration endpoint
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: 'Test User',
                        email: 'test@example.com',
                        password: 'testpassword',
                        role: 'CLIENT'
                    })
                });
                
                if (response.status === 409) {
                    addResult('Auth API', 'success', '✅ Auth API is working (user already exists)');
                } else if (response.ok) {
                    addResult('Auth API', 'success', '✅ Auth API is working (registration successful)');
                } else {
                    const errorData = await response.json();
                    addResult('Auth API', 'error', `❌ Auth API failed: ${errorData.message || response.status}`);
                }
            } catch (error) {
                addResult('Auth API', 'error', `❌ Auth API failed: ${error.message}`);
            }
        }
        
        // Auto-run health check on page load
        window.onload = function() {
            testHealthCheck();
        };
    </script>
</body>
</html>
