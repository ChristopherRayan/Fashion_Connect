<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        input { padding: 8px; margin: 5px; width: 200px; }
    </style>
</head>
<body>
    <h1>Direct Login Test</h1>
    
    <div>
        <input type="email" id="email" placeholder="Email" value="chikondi.banda@example.com">
        <input type="password" id="password" placeholder="Password" value="password123">
        <button onclick="testLogin()">Test Login</button>
    </div>
    
    <div id="results"></div>

    <script>
        function addResult(message, isSuccess = false) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${isSuccess ? 'success' : 'error'}`;
            div.innerHTML = `${new Date().toLocaleTimeString()}: ${message}`;
            results.appendChild(div);
        }
        
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            addResult('🔍 Testing login...');
            addResult(`📧 Email: ${email}`);
            addResult(`🔑 Password: ${password}`);
            
            try {
                const response = await fetch('http://localhost:3000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                addResult(`📊 Response status: ${response.status}`);
                
                if (response.ok) {
                    const data = await response.json();
                    addResult(`✅ Login successful!`, true);
                    addResult(`👤 User: ${data.data.user.name}`, true);
                    addResult(`🎭 Role: ${data.data.user.role}`, true);
                    addResult(`🔑 Token: ${data.data.accessToken.substring(0, 20)}...`, true);
                } else {
                    const errorData = await response.json();
                    addResult(`❌ Login failed: ${errorData.message}`);
                }
            } catch (error) {
                addResult(`❌ Network error: ${error.message}`);
                console.error('Login error:', error);
            }
        }
    </script>
</body>
</html>
