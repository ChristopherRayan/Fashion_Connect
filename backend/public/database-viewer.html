<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionConnect Database Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .nav {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .nav-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        
        .nav-btn.active {
            background: #28a745;
        }
        
        .content {
            padding: 30px;
            min-height: 400px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #e9ecef;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e9ecef;
            vertical-align: top;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        
        .json-view {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗄️ FashionConnect Database Viewer</h1>
            <p>View and explore your MongoDB collections</p>
        </div>
        
        <div class="nav">
            <div class="nav-buttons">
                <button class="nav-btn active" onclick="loadOverview()">📊 Overview</button>
                <button class="nav-btn" onclick="loadCollection('users')">👥 Users</button>
                <button class="nav-btn" onclick="loadCollection('products')">🛍️ Products</button>
                <button class="nav-btn" onclick="loadCollection('orders')">📦 Orders</button>
                <button class="nav-btn" onclick="loadCollection('invoices')">🧾 Invoices</button>
                <button class="nav-btn" onclick="loadCollection('messages')">💬 Messages</button>
                <button class="nav-btn" onclick="loadCollection('notifications')">🔔 Notifications</button>
                <button class="nav-btn" onclick="loadCollection('reviews')">⭐ Reviews</button>
            </div>
        </div>
        
        <div class="content" id="content">
            <div class="loading">Loading database overview...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api/v1';
        let authToken = null;

        // Login first (you'll need to replace with actual admin token)
        async function login() {
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@example.com',
                        password: 'password'
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    authToken = data.data.accessToken;
                    loadOverview();
                } else {
                    showError('Failed to authenticate. Please check admin credentials.');
                }
            } catch (error) {
                showError('Failed to connect to server. Make sure backend is running.');
            }
        }

        async function apiCall(endpoint) {
            if (!authToken) {
                await login();
                if (!authToken) return null;
            }

            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                return data.success ? data.data : null;
            } catch (error) {
                console.error('API call failed:', error);
                return null;
            }
        }

        async function loadOverview() {
            setActiveButton('📊 Overview');
            showLoading();
            
            const data = await apiCall('/database/overview');
            if (!data) {
                showError('Failed to load database overview');
                return;
            }

            const html = `
                <h2>📊 Database Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${data.counts.users}</div>
                        <div class="stat-label">Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${data.counts.products}</div>
                        <div class="stat-label">Products</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${data.counts.orders}</div>
                        <div class="stat-label">Orders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${data.counts.invoices}</div>
                        <div class="stat-label">Invoices</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${data.counts.messages}</div>
                        <div class="stat-label">Messages</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${data.counts.notifications}</div>
                        <div class="stat-label">Notifications</div>
                    </div>
                </div>
                
                <h3>Database Information</h3>
                <div class="json-view">${JSON.stringify(data.database, null, 2)}</div>
                
                <h3>Collections</h3>
                <div class="json-view">${data.collections.join(', ')}</div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }

        async function loadCollection(collection) {
            setActiveButton(getCollectionIcon(collection) + ' ' + collection.charAt(0).toUpperCase() + collection.slice(1));
            showLoading();
            
            const data = await apiCall(`/database/${collection}`);
            if (!data) {
                showError(`Failed to load ${collection} data`);
                return;
            }

            let html = `<h2>${getCollectionIcon(collection)} ${collection.charAt(0).toUpperCase() + collection.slice(1)} (${data.length} records)</h2>`;
            
            if (data.length === 0) {
                html += '<p>No records found in this collection.</p>';
            } else {
                html += generateTable(data, collection);
            }
            
            document.getElementById('content').innerHTML = html;
        }

        function generateTable(data, collection) {
            if (data.length === 0) return '<p>No data available</p>';
            
            const sample = data[0];
            const headers = Object.keys(sample).filter(key => !key.startsWith('__'));
            
            let html = '<div class="table-container"><table><thead><tr>';
            headers.forEach(header => {
                html += `<th>${header}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            data.slice(0, 20).forEach(item => { // Show first 20 records
                html += '<tr>';
                headers.forEach(header => {
                    let value = item[header];
                    if (typeof value === 'object' && value !== null) {
                        if (value.name) value = value.name;
                        else if (value._id) value = value._id;
                        else value = JSON.stringify(value).substring(0, 50) + '...';
                    }
                    if (typeof value === 'string' && value.length > 50) {
                        value = value.substring(0, 50) + '...';
                    }
                    
                    // Add badges for status fields
                    if (header === 'status' || header === 'role') {
                        value = `<span class="badge badge-info">${value}</span>`;
                    }
                    
                    html += `<td>${value || '-'}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table></div>';
            
            if (data.length > 20) {
                html += `<p><em>Showing first 20 of ${data.length} records</em></p>`;
            }
            
            return html;
        }

        function getCollectionIcon(collection) {
            const icons = {
                users: '👥',
                products: '🛍️',
                orders: '📦',
                invoices: '🧾',
                messages: '💬',
                notifications: '🔔',
                reviews: '⭐'
            };
            return icons[collection] || '📄';
        }

        function setActiveButton(text) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === text) {
                    btn.classList.add('active');
                }
            });
        }

        function showLoading() {
            document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `<div class="error">${message}</div>`;
        }

        // Initialize
        login();
    </script>
</body>
</html>
